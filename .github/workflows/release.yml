name: Release Build

on:
  release:
    types: [published]

jobs:
  build:
    name: Build
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set Default Scheme
        run: |
          scheme_list=$(xcodebuild -list -json | tr -d "\n")
          default=$(echo $scheme_list | ruby -e "require 'json'; puts JSON.parse(STDIN.gets)['project']['targets'][0]")
          echo $default | cat >default
          echo Using default scheme: $default
      - name: Build with xcodebuild
        env:
          scheme: ${{ 'default' }}
        run: |
          if [ $scheme = default ]; then scheme=$(cat default); fi
          if [ "`ls -A | grep -i \\.xcworkspace\$`" ]; then filetype_parameter="workspace" && file_to_build="`ls -A | grep -i \\.xcworkspace\$`"; else filetype_parameter="project" && file_to_build="`ls -A | grep -i \\.xcodeproj\$`"; fi
          file_to_build=`echo $file_to_build | awk '{$1=$1;print}'`
          xcodebuild clean archive -scheme "$scheme" -"$filetype_parameter" "$file_to_build" -archivePath "./build/App.xcarchive" -configuration Release CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" AD_HOC_CODE_SIGNING_ALLOWED=YES | xcpretty && exit ${PIPESTATUS[0]}

      - name: Create DMG
        run: |
          brew install create-dmg
          mkdir -p ./dist && cp -R ./build/App.xcarchive/Products/Applications/*.app ./dist/
          app_name=$(ls ./dist/ | grep .app)
          create-dmg --volname "Install ${app_name%.app}" --window-pos 200 120 --window-size 600 400 --icon-size 100 --icon "$app_name" 175 120 --hide-extension "$app_name" --app-drop-link 425 120 "${app_name%.app}.dmg" "./dist/"

      - name: Upload to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.event.release.tag_name }} ./*.dmg
